<!DOCTYPE html>
<html>
    <head>
        <title> mapping</title>
    </head>
    <h2>mapping</h2>
    <p id = "demo"></p>
    <script>
        const numbers = [1, 4, 9];
        function myFunction(num) {
            return num * 10;
        }
        var newarray = numbers.map(myFunction);
        document.getElementById("demo").innerHTML = newarray;
        </script>
        </body>
</html>
