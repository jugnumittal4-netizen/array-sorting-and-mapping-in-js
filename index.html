<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>evaluating

    </title>
    </head>
    <body>
        <h2>evaluating variable</h2>
        <p id = "demo"></p>
        <button onclick="myFunction()"> click me </button>
        <script>
            function myFunction() {
                var x = 20;
                var y = 10;
              var a = eval(x * y ) + "<br>";
                var b = eval(x / y ) + "<br>";
                var c = eval(x + y ) + "<br>";
                var res = a + b + c;
                document.getElementById("demo").innerHTML = res;
            }
            </script>
            
           

    </body>
</html>
