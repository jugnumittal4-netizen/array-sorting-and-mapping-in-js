<!DOCTYPE html>
<html>
    <head>
        <title> js array sort</title>

    </head>
    <h1> js array sort</h1>
    <p>
        click the button to sort the array in ascending order
    </p>
    <button onclick="ascending()"> ascending </button>
    <button onclick="descending()"> descending </button>
    <p id = "demo"></p>
    <script>
        var points = [40, 100, 1, 5, 25, 10];
        document.getElementById("demo").innerHTML = points;

        function ascending() {
            points.sort(function(a, b)
            {return a - b});
            document.getElementById("demo").innerHTML = points;
        }
        function descending() 
        {
            points.sort(function(a, b)
            {return b - a});
            document.getElementById("demo").innerHTML = points;
        }
        </script>
        </body>
        
</html>
